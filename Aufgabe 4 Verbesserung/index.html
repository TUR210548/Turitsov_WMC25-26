<!doctype html>
<html class="no-js" lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Todo App</title>

  <link rel="stylesheet" href="style.css">
  <meta name="description" content="">

  <script type="module" defer src="app.js"></script>
</head>

<body>

  <h1>Todo List</h1>

  <input id="todo-input" type="text" placeholder="What needs to be done">
  
  <select id="todo-priority">
    <option value="1">Priorität 1 (Hoch)</option>
    <option value="2">Priorität 2</option>
    <option value="3" selected>Priorität 3 (Normal)</option>
    <option value="4">Priorität 4</option>
    <option value="5">Priorität 5 (Niedrig)</option>
  </select>

  <button id="todo-add" type="button">Add</button>

  <h2>Pending Tasks</h2>
  <ul id="todo-list">
    </ul>

  <h2>Done</h2>
  <ul id="todo-list-done">
    </ul>

</body>

</html>
